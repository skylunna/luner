version: '3.8'
services:
  ai-gateway:
    build: .
    ports:
      - "8080:8080"
      - "9090:9090" # 预留 Prometheus/Grafana 对接
    volumes:
      - ./config:/app/config:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"