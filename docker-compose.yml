services:
  ai-gateway:
    container_name: ai-gateway
    build: .
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./config/config.yaml:/app/config.yaml:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"