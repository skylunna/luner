version: 2

project_name: luner

builds:
  - id: "luner"
    main: ./cmd/luner
    binary: luner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

dockers:
  - id: luner-amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/skylunna/luner:{{ .Version }}-amd64"
      - "ghcr.io/skylunna/luner:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }} - LLM API Gateway"
      - "--label=org.opencontainers.image.url=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.source=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  # ARM64 构建
  - id: luner-arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/skylunna/luner:{{ .Version }}-arm64"
      - "ghcr.io/skylunna/luner:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }} - LLM API Gateway"
      - "--label=org.opencontainers.image.url=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.source=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"


docker_manifests:
  - name_template: "ghcr.io/skylunna/luner:{{ .Version }}"
    image_templates:
      - "ghcr.io/skylunna/luner:{{ .Version }}-amd64"
      - "ghcr.io/skylunna/luner:{{ .Version }}-arm64"

    skip_push: auto
  
  - name_template: "ghcr.io/skylunna/luner:latest"
    image_templates:
      - "ghcr.io/skylunna/luner:latest-amd64"
      - "ghcr.io/skylunna/luner:latest-arm64"

    skip_push: auto
archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - config/config.example.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch