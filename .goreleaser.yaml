version: 2

project_name: tiny-llm-gateway

builds:
  - id: luner
    main: ./cmd/luner
    binary: luner
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/skylunna/luner/cmd/luner.Version={{.Version}}
      - -X github.com/skylunna/luner/cmd/luner.commit={{.Commit}}
      - -X github.com/skylunna/luner/cmd/luner.buildDate={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE
      - config/config.example.yaml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

dockers_v2:
  - id: luner-docker
    image_templates:
      - "ghcr.io/skylunna/luner:{{ .Version }}"
      - "ghcr.io/skylunna/luner:latest"
    dockerfile: Dockerfile

    buildx: true

    platforms:
      - linux/amd64
      - linux/arm64
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }} - LLM API Gateway"
      - "--label=org.opencontainers.image.url=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.source=https://github.com/skylunna/luner"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"