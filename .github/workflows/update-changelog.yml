name: Update Changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to push CHANGELOG.md

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tag comparison
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -F "${{ github.ref_name }}" -A 1 | tail -n 1 || echo "")
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        id: changelog
        run: |
          ENTRY=$(./scripts/generate-changelog.sh "${{ github.ref_name }}" "${{ steps.prev_tag.outputs.prev_tag }}")
          # Escape for JSON (handle newlines and quotes)
          ENTRY="${ENTRY//'%'/'%25'}"
          ENTRY="${ENTRY//$'\n'/'%0A'}"
          ENTRY="${ENTRY//$'\r'/'%0D'}"
          echo "entry=$ENTRY" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          # Insert new entry after the header lines (first 6 lines)
          {
            head -n 6 CHANGELOG.md
            echo ""
            echo "${{ steps.changelog.outputs.entry }}"
            echo ""
            tail -n +7 CHANGELOG.md
          } > CHANGELOG.md.new
          
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit and push CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]
          
          Auto-generated by github-actions[bot] via update-changelog workflow."
          
          # Push without triggering new workflow ([skip ci])
          git push origin HEAD:main

      - name: Comment on Release (optional)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `📝 CHANGELOG.md auto-updated for release \`${{ github.ref_name }}\`.  
              View the full changelog: https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md`
            })