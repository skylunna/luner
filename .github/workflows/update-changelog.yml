name: Update Changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -F "${{ github.ref_name }}" -A 1 | tail -n 1 || echo "")
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        id: changelog
        run: |
          # Write to file to preserve newlines
          ./scripts/generate-changelog.sh "${{ github.ref_name }}" "${{ steps.prev_tag.outputs.prev_tag }}" > /tmp/changelog_entry.md
          
          # Use GITHUB_OUTPUT file for multi-line values (no %0A escaping needed)
          {
            echo "entry<<EOF"
            cat /tmp/changelog_entry.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          # Insert after header (first 6 lines, adjust if your header length differs)
          HEADER_LINES=6
          {
            head -n $HEADER_LINES CHANGELOG.md
            echo ""
            cat /tmp/changelog_entry.md
            echo "---"  # Separator aligned with your existing style
            tail -n +$((HEADER_LINES + 1)) CHANGELOG.md
          } > CHANGELOG.md.new
          
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]
          
          Auto-generated by github-actions[bot]."
          
          git push origin HEAD:main

  update-release:
    needs: update-changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -F "${{ github.ref_name }}" -A 1 | tail -n 1 || echo "")
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate changelog entry (for Release body)
        id: release_body
        run: |
          # Generate clean markdown for Release body
          ./scripts/generate-changelog.sh "${{ github.ref_name }}" "${{ steps.prev_tag.outputs.prev_tag }}" > /tmp/release_body.md
          
          # Add header + footer for Release page (optional but professional)
          {
            echo "## 🚀 What's New in ${{ github.ref_name }}"
            echo ""
            cat /tmp/release_body.md
            echo ""
            echo "---"
            echo ""
            echo "### 🔗 Links"
            echo "- 📄 Full changelog: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
            echo "- 🐳 Docker: \`docker pull ghcr.io/${{ github.repository_owner }}/luner:${{ github.ref_name }}\`"
            echo "- 📦 Binaries: See Assets below"
          } > /tmp/release_body_final.md
          
          # Output for action-gh-release
          {
            echo "body<<EOF"
            cat /tmp/release_body_final.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_body.outputs.body }}
          token: ${{ secrets.GITHUB_TOKEN }}
        # Only run if release exists (created by GoReleaser)
        if: startsWith(github.ref, 'refs/tags/')